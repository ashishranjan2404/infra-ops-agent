# workloads.yaml — 16 mock service deployments + redis + upstream-mock + load-gen.
# Each pod runs a tiny python server (from the mock-svc-src ConfigMap) that:
#   - serves :8080 (app traffic, hit by load-gen)
#   - serves :9090/metrics (app_* Prometheus metrics)
#   - prints $CHAOS_MARKER to stdout every 2s when that env is non-empty
#     (06_run_scenario.sh sets CHAOS_MARKER at fault time so preq can match the CRE)
# When CHAOS_MARKER is set the app_* metrics also flip to their unhealthy values,
# so the synthetic SLO signals (dns/tls/cache/upstream/error-rate/db/lag/latency)
# move in lockstep with the injected fault. Pod-level signals (memory, cpu,
# restarts, node condition, unavailable replicas) come from kube-state-metrics
# / cAdvisor and are real.
apiVersion: v1
kind: Namespace
metadata:
  name: rlvr-target
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mock-svc-src
  namespace: rlvr-target
data:
  server.py: |
    import os, time, threading
    from http.server import BaseHTTPRequestHandler, HTTPServer

    APP = os.environ.get("APP", "svc")
    MARKER = os.environ.get("CHAOS_MARKER", "").strip()

    def unhealthy():
        # unhealthy while a chaos marker is active (set by 06_run_scenario.sh)
        # or while a sentinel file exists (set by some pod-exec faults).
        return bool(MARKER) or os.path.exists("/tmp/chaos-on")

    BUCKETS = [0.05, 0.1, 0.25, 0.5, 1, 2.5, 5]
    lock = threading.Lock()
    st = {
        "dns_lookups": 0.0, "dns_errors": 0.0,
        "tls_total": 0.0, "tls_ok": 0.0,
        "cache_req": 0.0, "cache_hit": 0.0,
        "up_req": 0.0, "up_2xx": 0.0,
        "req_200": 0.0, "req_500": 0.0,
        "hsum": 0.0, "hcount": 0.0, "hinf": 0.0,
    }
    hist = {b: 0.0 for b in BUCKETS}

    def ticker():
        while True:
            u = unhealthy()
            with lock:
                st["dns_lookups"] += 100; st["dns_errors"] += (50 if u else 0)
                st["tls_total"] += 100;   st["tls_ok"] += (10 if u else 100)
                st["cache_req"] += 100;   st["cache_hit"] += (12 if u else 95)
                st["up_req"] += 100;      st["up_2xx"] += (30 if u else 100)
                st["req_200"] += 100;     st["req_500"] += (20 if u else 0)
                lat = 1.5 if u else 0.05
                for _ in range(100):
                    st["hsum"] += lat; st["hcount"] += 1; st["hinf"] += 1
                    for b in BUCKETS:
                        if lat <= b:
                            hist[b] += 1
            if MARKER:
                print(MARKER, flush=True)
            time.sleep(2)

    def render():
        u = unhealthy()
        db = 100 if u else 10
        lag = 800 if u else 5
        a = APP
        with lock:
            out = [
                f'app_dns_lookups_total{{app="{a}"}} {st["dns_lookups"]}',
                f'app_dns_errors_total{{app="{a}"}} {st["dns_errors"]}',
                f'app_tls_handshake_total{{app="{a}"}} {st["tls_total"]}',
                f'app_tls_handshake_success_total{{app="{a}"}} {st["tls_ok"]}',
                f'app_cache_requests_total{{app="{a}"}} {st["cache_req"]}',
                f'app_cache_hits_total{{app="{a}"}} {st["cache_hit"]}',
                f'app_upstream_requests_total{{app="{a}"}} {st["up_req"]}',
                f'app_upstream_2xx_total{{app="{a}"}} {st["up_2xx"]}',
                f'app_requests_total{{app="{a}",status="200"}} {st["req_200"]}',
                f'app_requests_total{{app="{a}",status="500"}} {st["req_500"]}',
                f'app_db_conn_in_use{{app="{a}"}} {db}',
                f'app_consumer_lag_k{{app="{a}"}} {lag}',
            ]
            for b in BUCKETS:
                out.append(f'http_request_duration_seconds_bucket{{app="{a}",le="{b}"}} {hist[b]}')
            out.append(f'http_request_duration_seconds_bucket{{app="{a}",le="+Inf"}} {st["hinf"]}')
            out.append(f'http_request_duration_seconds_sum{{app="{a}"}} {st["hsum"]}')
            out.append(f'http_request_duration_seconds_count{{app="{a}"}} {st["hcount"]}')
        return ("\n".join(out) + "\n").encode()

    class Metrics(BaseHTTPRequestHandler):
        def do_GET(self):
            body = render()
            self.send_response(200)
            self.send_header("Content-Type", "text/plain; version=0.0.4")
            self.end_headers()
            self.wfile.write(body)
        def log_message(self, *a):
            pass

    class App(BaseHTTPRequestHandler):
        def do_GET(self):
            code = 500 if (unhealthy() and APP in ("orders",)) else 200
            self.send_response(code)
            self.end_headers()
            self.wfile.write(b"ok\n")
        def log_message(self, *a):
            pass

    if __name__ == "__main__":
        threading.Thread(target=ticker, daemon=True).start()
        threading.Thread(
            target=lambda: HTTPServer(("0.0.0.0", 9090), Metrics).serve_forever(),
            daemon=True,
        ).start()
        HTTPServer(("0.0.0.0", 8080), App).serve_forever()
---
# --- redis (shared cache / queue used by cache_stampede + consumer_lag) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: rlvr-target
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: rlvr-target
spec:
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
# --- upstream-mock (the dependency recommendations / search call) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: upstream-mock
  namespace: rlvr-target
  labels:
    app: upstream-mock
    tier: mock-svc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: upstream-mock
  template:
    metadata:
      labels:
        app: upstream-mock
        tier: mock-svc
    spec:
      containers:
        - name: svc
          image: python:3.11-slim
          command: ["python3", "/app/server.py"]
          env:
            - name: APP
              value: upstream-mock
            - name: CHAOS_MARKER
              value: ""
          ports:
            - name: http
              containerPort: 8080
            - name: metrics
              containerPort: 9090
          volumeMounts:
            - name: src
              mountPath: /app
          resources:
            requests:
              cpu: 25m
              memory: 48Mi
            limits:
              cpu: 250m
              memory: 192Mi
      volumes:
        - name: src
          configMap:
            name: mock-svc-src
---
apiVersion: v1
kind: Service
metadata:
  name: upstream-mock
  namespace: rlvr-target
spec:
  selector:
    app: upstream-mock
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
