metadata:
  name: billing
  namespace: rlvr-target
  labels:
    app: billing
    tier: mock-svc
spec:
  replicas: 2
  selector:
    matchLabels:
      app: billing
  template:
    metadata:
      labels:
        app: billing
        tier: mock-svc
    spec:
      containers:
        - name: svc
          image: python:3.11-slim
          command: ["python3", "/app/server.py"]
          env:
            - name: APP
              value: billing
            - name: CHAOS_MARKER
              value: ""
          ports:
            - name: http
              containerPort: 8080
            - name: metrics
              containerPort: 9090
          volumeMounts:
            - name: src
              mountPath: /app
          resources:
            requests:
              cpu: 25m
              memory: 48Mi
            limits:
              cpu: 256m
              memory: 256Mi
      volumes:
        - name: src
          configMap:
            name: mock-svc-src
---
apiVersion: v1
kind: Service
metadata:
  name: billing
  namespace: rlvr-target
spec:
  selector:
    app: billing
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: metrics
      port: 9090
      targetPort: 9090
