---
# --- load generator: continuously curls every service :8080 ---
apiVersion: batch/v1
kind: Job
metadata:
  name: load-gen
  namespace: rlvr-target
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app: load-gen
    spec:
      restartPolicy: OnFailure
      containers:
        - name: load-gen
          image: curlimages/curl:8.7.1
          command:
            - sh
            - -c
            - |
              services="checkout payments auth cart search inventory orders notifications gateway user-profile recommendations billing shipping catalog sessions media-upload"
              while true; do
                for s in $services; do
                  curl -s -m 2 "http://$s:8080/" >/dev/null 2>&1 || true
                done
                sleep 5
              done
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
---
# --- PodMonitor so kube-prometheus-stack scrapes the app_* metrics on :9090 ---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: mock-svc
  namespace: rlvr-target
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - rlvr-target
  selector:
    matchLabels:
      tier: mock-svc
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      interval: 10s
