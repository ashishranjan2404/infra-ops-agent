  severity: 1
  title: "Stuck Rollout — shipping"
  category: deployment-problems
  author: rlvr-bench
  description: |
    - shipping rollout not progressing, replicas unavailable
    - New revision wedged past its progress deadline
  cause: |
    - Unpullable/broken image revision, deadline exceeded
