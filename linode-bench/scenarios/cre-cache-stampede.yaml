cre:
  id: CRE-2025-RLVR-009
  severity: 1
  title: "Cache Stampede — catalog"
  category: performance-problems
  author: rlvr-bench
  description: |
    - catalog cache hit ratio collapsed after a flush
    - Thundering herd of misses hitting the backing store
  cause: |
    - Cold cache (FLUSHALL) under concurrent load, no request coalescing
  impact: |
    - Backend overload, catalog latency and error rate climb
  mitigation: |
    - Warm the cache OR add request coalescing OR rate-limit misses
  references:
    - https://redis.io/docs/manual/client-side-caching/
  tags:
    - cre-2025-rlvr-009
    - rlvr
    - cache
    - stampede
